<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - FreshMart Grocery</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .product-detail {
            padding: 60px 0;
        }
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }
        .product-image-large {
            width: 100%;
            border-radius: 10px;
        }
        .product-detail-info h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        .product-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }
        .reviews-section {
            margin-top: 60px;
        }
        @media (max-width: 768px) {
            .product-detail-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <p>Free Shipping on Orders Over $50 | Customer Support: 1-800-FRESH-01</p>
            </div>
        </div>
        
        <div class="header-main">
            <div class="container">
                <div class="header-content">
                    <a href="index.html" class="logo">Fresh<span>Mart</span></a>
                    
                    <div class="search-bar">
                        <form id="searchForm" class="search-form">
                            <input type="text" id="searchInput" class="search-input" 
                                   placeholder="Search for products...">
                            <button type="submit" class="search-btn">Search</button>
                        </form>
                    </div>
                    
                    <div class="header-actions">
                        <a href="login.html" id="loginLink" class="header-icon">👤</a>
                        <a href="cart.html" class="header-icon">
                            🛒
                            <span id="cartBadge" class="badge">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Product Detail -->
    <section class="product-detail">
        <div class="container">
            <div id="productDetail" class="product-detail-container">
                <!-- Product details loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 FreshMart Grocery. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        async function loadProductDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (!productId) {
                window.location.href = 'products.html';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/products.php?action=detail&id=${productId}`);
                const data = await response.json();
                
                if (data.success) {
                    renderProductDetail(data.product);
                } else {
                    showNotification('Product not found', 'error');
                    setTimeout(() => window.location.href = 'products.html', 2000);
                }
            } catch (error) {
                console.error('Load product error:', error);
            }
        }
        
        function renderProductDetail(product) {
            document.title = `${product.name} - FreshMart Grocery`;
            
            const container = document.getElementById('productDetail');
            container.innerHTML = `
                <div>
                    <img src="assets/images/products/${product.image}" alt="${product.name}" class="product-image-large">
                </div>
                <div class="product-detail-info">
                    <h1>${product.name}</h1>
                    <div class="product-meta">
                        <div class="product-rating">
                            <span class="stars">${'⭐'.repeat(Math.round(product.avg_rating || 5))}</span>
                            <span class="rating-count">(${product.review_count || 0} reviews)</span>
                        </div>
                        <span>Brand: ${product.brand || 'N/A'}</span>
                        <span>Stock: ${product.stock > 0 ? product.stock + ' available' : 'Out of stock'}</span>
                    </div>
                    
                    <div class="product-price" style="margin-bottom: 20px;">
                        <span class="current-price" style="font-size: 36px;">${formatCurrency(product.price)}</span>
                        ${product.original_price ? `<span class="original-price" style="font-size: 24px;">${formatCurrency(product.original_price)}</span>` : ''}
                    </div>
                    
                    <p style="margin-bottom: 20px; line-height: 1.8;">${product.description || 'Fresh and high quality product.'}</p>
                    
                    <div class="quantity-control">
                        <label style="font-weight: 600;">Quantity:</label>
                        <button class="qty-btn" onclick="changeQty(-1)">-</button>
                        <input type="number" id="quantity" class="qty-input" value="1" min="1" max="${product.stock}">
                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button class="btn btn-primary" onclick="addToCart(${product.id})" style="flex: 1; padding: 15px;">
                            Add to Cart
                        </button>
                        <button class="btn-wishlist add-to-wishlist" data-product-id="${product.id}" 
                                style="padding: 15px 20px; font-size: 20px;">
                            ❤️
                        </button>
                    </div>
                </div>
            `;
        }
        
        function changeQty(delta) {
            const input = document.getElementById('quantity');
            const newValue = parseInt(input.value) + delta;
            if (newValue >= 1 && newValue <= parseInt(input.max)) {
                input.value = newValue;
            }
        }
        
        async function addToCart(productId) {
            const quantity = parseInt(document.getElementById('quantity').value) || 1;

            try {
                const response = await fetch(`${API_BASE}/cart.php?action=add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ product_id: productId, quantity })
                });

                const data = await response.json();

                if (data.success) {
                    if (typeof updateCartBadge === 'function') {
                        updateCartBadge();
                    }
                    showNotification('Added to cart!', 'success');
                } else {
                    showNotification(data.message || 'Unable to add to cart', 'error');
                }
            } catch (error) {
                console.error('Add to cart error:', error);
                showNotification('Unable to add to cart', 'error');
            }
        }
        
        loadProductDetail();
    </script>
</body>
</html>
