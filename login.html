<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | FreshMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(135deg, #4eb451, #2e7d32);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-card{
      background:#fff;
      width:100%;
      max-width:420px;
      padding:35px;
      border-radius:12px;
      box-shadow:0 20px 40px rgba(0,0,0,0.2);
    }

    .logo{
      text-align:center;
      margin-bottom:25px;
      color:#2e7d32;
    }

    .logo i{
      font-size:40px;
      margin-bottom:5px;
    }

    .logo h2{
      font-weight:600;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      color:#333;
    }

    .input-box{
      position:relative;
    }

    .input-box i{
      position:absolute;
      top:50%;
      left:12px;
      transform:translateY(-50%);
      color:#999;
    }

    .input-box input{
      width:100%;
      padding:12px 12px 12px 38px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#4CAF50;
    }

    .toggle-password{
      position:absolute;
      top:50%;
      right:12px;
      transform:translateY(-50%);
      cursor:pointer;
      color:#999;
    }

    .options{
      display:flex;
      justify-content:space-between;
      font-size:14px;
      margin-bottom:20px;
    }

    .options a{
      text-decoration:none;
      color:#4CAF50;
    }

    .login-btn{
      width:100%;
      padding:12px;
      background:#4CAF50;
      border:none;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#388e3c;
    }

    .footer-text{
      text-align:center;
      margin-top:20px;
      font-size:14px;
    }

    .footer-text a{
      color:#4CAF50;
      text-decoration:none;
      font-weight:500;
    }

    .error{
      color:red;
      font-size:13px;
      margin-top:4px;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <i class="fas fa-shopping-basket"></i>
    <h2>FreshMart</h2>
    <p>Login to continue</p>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <div class="input-box">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email">
      </div>
      <div class="error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-box">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password">
        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
      </div>
      <div class="error" id="passwordError"></div>
    </div>

    <div class="options">
      <label><input type="checkbox"> Remember me</label>
      <a href="#">Forgot?</a>
    </div>

    <button class="login-btn">Login</button>
  </form>

  <div class="footer-text">
    Do not have an account? <a href="register.html">Register</a>
  </div>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        emailError.textContent = "";
        passwordError.textContent = "";

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email) {
            emailError.textContent = "Email is required";
            return;
        }
        if (!password) {
            passwordError.textContent = "Password is required";
            return;
        }

        try {
            const res = await fetch("backend/api/auth.php?action=login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (data.success && data.user) {
                sessionStorage.setItem("user", JSON.stringify(data.user));
                window.location.href = "index.html";
            } else {
                passwordError.textContent = data.message || "Login failed";
            }
        } catch (err) {
            passwordError.textContent = "Unable to login. Please try again.";
            console.error("Login error:", err);
        }
    });

    function togglePassword() {
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
        } else {
            passwordInput.type = "password";
        }
    }
    </script>
</body>
</html>
