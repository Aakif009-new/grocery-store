<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FreshMart Grocery</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="header">
        <div class="header-main">
            <div class="container">
                <div class="header-content">
                    <a href="index.html" class="logo">Fresh<span>Mart</span></a>
                    <a href="cart.html" class="header-icon">🛒</a>
                </div>
            </div>
        </div>
    </header>

    <section style="padding: 60px 0;">
        <div class="container">
            <h1 class="section-title">Contact Us</h1>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1000px; margin: 0 auto;">
                <div>
                    <h3>Get in Touch</h3>
                    <form id="contactForm" style="margin-top: 20px;">
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Message</label>
                            <textarea name="message" class="form-control" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
                
                <div>
                    <h3>Contact Information</h3>
                    <div style="margin-top: 20px; line-height: 2;">
                        <p><strong>📧 Email:</strong> support@freshmart.com</p>
                        <p><strong>📞 Phone:</strong> 1-800-FRESH-01</p>
                        <p><strong>📍 Address:</strong> 123 Grocery Street, Food City, FC 12345</p>
                        <p><strong>🕒 Business Hours:</strong> Mon-Sat: 8AM - 8PM</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showNotification('Thank you! We will contact you soon.', 'success');
            e.target.reset();
        });
    </script>
</body>
</html>
