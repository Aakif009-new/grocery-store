
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - FreshMart Grocery</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .profile-section {
            padding: 60px 0;
        }
        .profile-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }
        .profile-sidebar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            height: fit-content;
        }
        .profile-menu {
            list-style: none;
        }
        .profile-menu li {
            padding: 12px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 5px;
            transition: background 0.3s;
        }
        .profile-menu li:hover,
        .profile-menu li.active {
            background: var(--bg-light);
            color: var(--primary-color);
            font-weight: 600;
        }
        .profile-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        .order-card {
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-processing { background: #cce5ff; color: #004085; }
        .status-shipped { background: #d1ecf1; color: #0c5460; }
        .status-delivered { background: #d4edda; color: #155724; }
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <p>Free Shipping on Orders Over $50 | Customer Support: 1-800-FRESH-01</p>
            </div>
        </div>
        
        <div class="header-main">
            <div class="container">
                <div class="header-content">
                    <a href="index.html" class="logo">Fresh<span>Mart</span></a>
                    
                    <div class="search-bar">
                        <form id="searchForm" class="search-form">
                            <input type="text" id="searchInput" class="search-input" 
                                   placeholder="Search for products...">
                            <button type="submit" class="search-btn">Search</button>
                        </form>
                    </div>
                    
                    <div class="header-actions">
                        <a href="profile.html" class="header-icon">👤</a>
                        <a href="cart.html" class="header-icon">
                            🛒
                            <span id="cartBadge" class="badge">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Profile Section -->
    <section class="profile-section">
        <div class="container">
            <h2 class="section-title">My Account</h2>
            
            <div class="profile-container">
                <div class="profile-sidebar">
                    <ul class="profile-menu">
                        <li class="active" onclick="showSection('orders')">My Orders</li>
                        <li onclick="showSection('profile')">Profile Settings</li>
                        <li onclick="showSection('addresses')">My Addresses</li>
                        <li onclick="location.href='index.html'">Logout</li>
                    </ul>
                </div>
                
                <div id="profileContent" class="profile-content">
                    <!-- Content loaded dynamically -->
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 FreshMart Grocery. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        // Check if user is logged in
        if (!currentUser) {
            window.location.href = 'login.html';
        }
        
        function showSection(section) {
            // Update active menu
            document.querySelectorAll('.profile-menu li').forEach(li => {
                li.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Load section content
            switch(section) {
                case 'orders':
                    loadOrders();
                    break;
                case 'profile':
                    loadProfileSettings();
                    break;
                case 'addresses':
                    loadAddresses();
                    break;
            }
        }
        
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/orders.php?action=list`);
                const data = await response.json();
                
                if (data.success) {
                    renderOrders(data.orders);
                }
            } catch (error) {
                console.error('Load orders error:', error);
            }
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('profileContent');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <h3>No orders yet</h3>
                        <p style="margin: 20px 0; color: var(--text-light);">Start shopping to see your orders here</p>
                        <a href="products.html" class="btn btn-primary">Browse Products</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <h3>My Orders</h3>
                ${orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <strong>Order #${order.order_number}</strong>
                                <p style="color: var(--text-light); font-size: 14px; margin-top: 5px;">
                                    ${new Date(order.created_at).toLocaleDateString()}
                                </p>
                            </div>
                            <span class="order-status status-${order.status}">${order.status.toUpperCase()}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <p><strong>Total:</strong> ${formatCurrency(order.grand_total)}</p>
                                <p style="color: var(--text-light); font-size: 14px;">
                                    Payment: ${order.payment_method.toUpperCase()}
                                </p>
                            </div>
                            <button class="btn" onclick="viewOrderDetails('${order.order_number}')">
                                View Details
                            </button>
                        </div>
                    </div>
                `).join('')}
            `;
        }
        
        async function loadProfileSettings() {
            try {
                const response = await fetch(`${API_BASE}/auth.php?action=profile`);
                const data = await response.json();
                
                if (data.success) {
                    renderProfileSettings(data.profile);
                }
            } catch (error) {
                console.error('Load profile error:', error);
            }
        }
        
        function renderProfileSettings(profile) {
            const container = document.getElementById('profileContent');
            container.innerHTML = `
                <h3>Profile Settings</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="${profile.full_name || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" value="${profile.email}" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" name="phone" class="form-control" value="${profile.phone || ''}">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="3">${profile.address || ''}</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" value="${profile.city || ''}">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">State</label>
                        <input type="text" name="state" class="form-control" value="${profile.state || ''}">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">ZIP Code</label>
                        <input type="text" name="zip_code" class="form-control" value="${profile.zip_code || ''}">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                </form>
            `;
            
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                
                try {
                    const response = await fetch(`${API_BASE}/auth.php?action=update_profile`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showNotification('Profile updated successfully!', 'success');
                    } else {
                        showNotification(result.message || 'Update failed', 'error');
                    }
                } catch (error) {
                    console.error('Update profile error:', error);
                    showNotification('An error occurred', 'error');
                }
            });
        }
        
        function loadAddresses() {
            const container = document.getElementById('profileContent');
            container.innerHTML = `
                <h3>My Addresses</h3>
                <p style="color: var(--text-light); margin: 20px 0;">
                    Manage your shipping addresses here. (Feature coming soon)
                </p>
                <button class="btn btn-primary">Add New Address</button>
            `;
        }
        
        async function viewOrderDetails(orderNumber) {
            try {
                const response = await fetch(`${API_BASE}/orders.php?action=detail&order_number=${orderNumber}`);
                const data = await response.json();
                
                if (data.success) {
                    alert(`Order Details:\n\nOrder #${orderNumber}\nStatus: ${data.order.status}\nTotal: ${formatCurrency(data.order.grand_total)}`);
                }
            } catch (error) {
                console.error('View order error:', error);
            }
        }
        
        // Load orders by default
        loadOrders();
    </script>
</body>
</html>
